<h2>Formular</h2>
<label>Nume: <input type="text" id="f-nume"></label><br><br>
<label>Email: <input type="email" id="f-email"></label><br><br>
<label>Varsta: <input type="number" id="f-varsta"></label><br><br>
<button onclick="validateAndSave()">Trimite</button>
<p id="rezultat"></p>

<script>
    function validateAndSave() {
        var nume   = document.getElementById('f-nume').value.trim();
        var email  = document.getElementById('f-email').value.trim();
        var varsta = Number(document.getElementById('f-varsta').value);

        if (!nume) {
            alert("Numele este obligatoriu!");
            return;
        }
        if (!/\S+@\S+\.\S+/.test(email)) {
            alert("Email invalid!");
            return;
        }
        if (varsta < 1 || varsta > 120) {
            alert("Varsta invalida!");
            return;
        }

        var userData = { nume: nume, email: email, varsta: varsta };
        console.log("Date salvate:", userData);
    }
</script>
